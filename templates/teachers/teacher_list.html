{% extends 'layout.html' %}

{% block title %}Teachers{% endblock %}

{% block content %}
<h2 class="page-title">Teachers</h2>

<table class="data-table">
    <thead>
        <tr><th>Name</th><th>Subject</th><th>Phone</th></tr>
    </thead>
    <tbody>
        {% for t in teachers %}
            <tr>
                <td>{{ t.user.get_full_name|default:t.user.username }}</td>
                <td>{{ t.subject }}</td>
                <td>{{ t.phone|default:"-" }}</td>
            </tr>
        {% empty %}
            <tr><td colspan="3">No teachers added yet.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
